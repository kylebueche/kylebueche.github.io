<div class="icon-buttons row center">
  {% for contact in site.data.posts.contacts %}
  <a class="icon-link" href="{{ contact.url }}" target="_blank">
    <div class="icon-button col center align-center">
      <i class="{{ contact.icon-class }}"></i>
      <p class="bold noselect">{{ contact.platform-name }}</p>
    </div>
  </a>
  {% endfor %}
</div>
